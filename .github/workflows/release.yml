# Release fan-out: on a `v*` tag, build prebuilt `glaselvm` CLI binaries (attached
# to the GitHub Release) AND publish the `glaseld` node Docker image to GHCR.
# Trigger: push a tag like `v0.1.0` (or run manually).
#
#   git tag v0.1.0 && git push origin v0.1.0
#
# Developers get the circuit-authoring CLI without a Rust toolchain; operators get
# `docker run ghcr.io/glaselxyz/glaseld:0.1.0` instead of compiling Rust.
# (npm publishing of the SDK is separate — see publish-sdk.yml, tagged sdk-v*.)
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g. v0.1.0)"
        required: true

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: node

      - name: Build glaselvm
        working-directory: node
        run: cargo build --release -p glaselvm --target ${{ matrix.target }}

      - name: Package tarball
        working-directory: node
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          DIST="glaselvm-${TAG}-${{ matrix.target }}"
          mkdir -p "$DIST"
          cp "target/${{ matrix.target }}/release/glaselvm" "$DIST/"
          cp ../README.md ../LICENSE "$DIST/" 2>/dev/null || true
          tar -czf "${DIST}.tar.gz" "$DIST"
          shasum -a 256 "${DIST}.tar.gz" > "${DIST}.tar.gz.sha256"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            node/glaselvm-*.tar.gz
            node/glaselvm-*.tar.gz.sha256

  docker:
    name: publish glaseld image (GHCR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute version + lowercased owner
        id: ver
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          # GHCR namespaces must be lowercase; the org is "Glaselxyz".
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: node/deploy/Dockerfile
          push: true
          # Repo owner is lower-cased for GHCR; image = ghcr.io/glaselxyz/glaseld
          tags: |
            ghcr.io/${{ steps.ver.outputs.owner }}/glaseld:${{ steps.ver.outputs.version }}
            ghcr.io/${{ steps.ver.outputs.owner }}/glaseld:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
